name: Deploy to Yegara Server

on:
  push:
    branches:
      - main   # Change to 'master' if that is your default branch

jobs:
  deploy:
    name: Deploy via cPanel Webhook
    runs-on: ubuntu-latest

    steps:
      - name: Trigger cPanel Git Deployment
        run: |
          curl -s -o response.txt -w "%{http_code}" \
            --max-time 300 \
            -H "Authorization: cpanel ${{ secrets.YEGARA_USER }}:${{ secrets.CPANEL_TOKEN }}" \
            "https://${{ secrets.YEGARA_HOST }}:2083/execute/VersionControl/update?repository_root=repositories%2Fabehotel-Sqlite" \
            | tee http_code.txt
          echo ""
          cat response.txt
          HTTP_CODE=$(cat http_code.txt | tail -1)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ cPanel deploy failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ cPanel git pull triggered successfully"
